services:
  db:
    image: postgis/postgis:16-3.4
    container_name: civicfix-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: civicfix
      POSTGRES_PASSWORD: civicfix
      POSTGRES_DB: civicfix
    ports:
      - "5433:5432"
    volumes:
      - civicfix_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicfix -d civicfix"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  civicfix_pgdata:
